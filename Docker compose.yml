services:

  app:
    build: .
    container_name: pdf-processor
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: local,dev
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/pdfprocessor
      SPRING_DATASOURCE_USERNAME: pdfuser
      SPRING_DATASOURCE_PASSWORD: pdfpass
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: guest
      SPRING_RABBITMQ_PASSWORD: guest
      SPRING_RABBITMQ_SSL_ENABLED: "false"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: pdf-postgres
    environment:
      POSTGRES_DB: pdfprocessor
      POSTGRES_USER: pdfuser
      POSTGRES_PASSWORD: pdfpass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pdfuser -d pdfprocessor"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: pdf-rabbitmq
    ports:
      - "5672:5672"    
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  postgres_data:
  rabbitmq_data: