spring.application.name=pdf-api

# PostgreSQL
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/pdfapi}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:pdfuser}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:pdfpass}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# CloudAMQP - RabbitMQ
spring.rabbitmq.addresses=${CLOUDAMQP_URL:amqps://usuario:senha@host/vhost}
spring.rabbitmq.ssl.enabled=true
spring.rabbitmq.ssl.validate-server-certificate=true

# Retry com backoff exponencial (3x antes da DLQ)
spring.rabbitmq.listener.simple.retry.enabled=true
spring.rabbitmq.listener.simple.retry.max-attempts=3
spring.rabbitmq.listener.simple.retry.initial-interval=1000
spring.rabbitmq.listener.simple.retry.multiplier=2.0
spring.rabbitmq.listener.simple.retry.max-interval=10000
spring.rabbitmq.listener.simple.acknowledge-mode=auto

# Upload
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# Profile e logging
spring.profiles.active=dev
logging.level.com.example.pdfapi=DEBUG
logging.level.org.springframework.amqp=INFO